name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Check Python syntax
        run: |
          python -m py_compile cli.py server.py
          python -m py_compile bot/*.py

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Test imports
        run: |
          python -c "from bot.client import BinanceClient"
          python -c "from bot.validators import validate_symbol"
          python -c "from bot.orders import place_order"
      
      - name: Verify Flask server
        run: |
          python -c "from server import app; print('Flask app loaded successfully')"

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Check for hardcoded credentials
        run: |
          ! grep -r "BINANCE_API_KEY\|api_key\|api_secret" cli.py server.py bot/*.py | grep -v "os.environ\|getenv"
      
      - name: Verify .gitignore
        run: |
          grep -q "^\.env$" .gitignore && echo ".env is in .gitignore" || exit 1

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Build Docker image
        run: docker build -t trading-bot:latest .
      
      - name: Verify Docker image
        run: docker run --rm trading-bot:latest python -c "from bot.client import BinanceClient; print('Docker image verified')"
