version: '3.8'

services:
  trading-bot:
    build: .
    container_name: binance-trading-bot
    ports:
      - "5000:5000"
    environment:
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
      - PORT=5000
      - LOG_LEVEL=INFO
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - trading-network

networks:
  trading-network:
    driver: bridge
